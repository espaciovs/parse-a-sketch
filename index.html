<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de datos</title>
    <link rel="stylesheet" href="styles/global.css">
    <script src="js/line-styles.js"></script>
    <script src="js/svg-loader.js"></script>
    <script src="js/canvas-renderer.js"></script>
    <script src="js/datos-renderer.js"></script>
    <script src="js/heatmap-renderer.js"></script>
    <script src="js/lineas-renderer.js"></script>
    <script src="js/configuracion.js"></script>
    <script src="js/respuestas.js"></script>
    <script src="js/visualizacion.js"></script>

</head>


<body>
    <nav>
        <h1>Visualizador de datos</h1>
        <div>
            <h2>Plantas</h2>
            <div class="grid-plantas">
            </div>
        </div>
        <div>
            <h2>Pregunta</h2>
            <select class="preguntas" name="preguntas">
            </select>
        </div>
        <div>
            <h2>Respuestas</h2>
            <div class="grid-respuestas">
                <button data-id="todas">Todas</button>
            </div>
        </div>
        <div>
            <h2>Configuración de la visualización</h2>
            <div class="config-visual">
                <p>Cuadrícula de plantas</p>
                <button class="config-visual-grid activo">Una</button>
                <button class="config-visual-grid">Varias</button>
            </div>
        </div>
        <!-- Solo visible cuando la pregunta activa es de tipo Draw/Redraw -->
        <div id="seccion-lineas" class="hidden">
            <h2>Modo líneas</h2>
            <div class="config-visual">
                <button class="config-lineas-btn activo">Normal</button>
                <button class="config-lineas-btn">Mono</button>
            </div>
            <div id="mono-extra" class="hidden">
                <div class="slider-fila">
                    <label>Grosor</label>
                    <input type="range" id="slider-grosor" min="0.5" max="8" step="0.5" value="2">
                </div>
                <div class="slider-fila">
                    <label>Opacidad</label>
                    <input type="range" id="slider-opacidad" min="0.05" max="1" step="0.05" value="0.6">
                </div>
                <div class="config-sub">Suavizado</div>
                <div class="config-visual">
                    <button class="config-suavizado-btn activo">Off</button>
                    <button class="config-suavizado-btn">On</button>
                </div>
                <div id="suavizado-extra" class="hidden slider-fila">
                    <label>Intensidad</label>
                    <input type="range" id="slider-suavizado" min="1" max="20" step="1" value="5">
                </div>
                <div class="config-sub">Edge bundling</div>
                <div class="config-visual">
                    <button class="config-bundling-btn activo">Off</button>
                    <button class="config-bundling-btn">On</button>
                </div>
            </div>
        </div>
        <!-- Solo visible cuando la pregunta activa es de tipo Point -->
        <div id="seccion-heatmap" class="hidden">
            <h2>Modo puntos</h2>
            <div class="config-visual">
                <button class="config-heatmap-btn activo">Puntos</button>
                <button class="config-heatmap-btn">Heatmap</button>
            </div>
        </div>
        <div>
            <h2>JSON</h2>
            <pre>
            </pre>
        </div>

    </nav>
    <main class="bg-dot-grid">
        <div class="info">
            <h1 id="planta"></h1>
            <p>-</p>
            <h2 id="pregunta"></h2>
        </div>

        <div class="canvas-wrapper">
            <!-- Canvas 1: planta SVG (gestionado por canvas-renderer.js y svg-loader.js) -->
            <canvas id="canvas-plantas"></canvas>
            <!-- Canvas 2: datos del usuario encima de la planta (gestionado por datos-renderer.js) -->
            <canvas id="canvas-datos"></canvas>
        </div>


    </main>
</body>

</html>
